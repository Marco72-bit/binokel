<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Binockel">
<title>Binockel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--bg2:#0f0f0f;--surface:#131313;--surface2:#1c1c1c;
  --border:#242424;--border2:#333333;
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,.15);--gold-glow:rgba(201,168,76,.08);
  --cream:#f0ece4;--cream2:rgba(240,236,228,.88);--cream3:rgba(240,236,228,.12);--cream4:rgba(240,236,228,.06);
  --red:#d95e5e;--red-dim:rgba(217,94,94,.15);--green:#6ecf76;--muted:#888888;
  --r:12px;--rs:8px;--ff:'Inter',system-ui,sans-serif;--fu:'Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--cream);font-family:var(--fu);font-size:16px;line-height:1.55;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh}
.screen{display:none;flex-direction:column;height:100vh;height:100dvh}
.screen.on{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* HDR */
.hdr{padding:max(env(safe-area-inset-top),18px) 18px 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-family:var(--ff);font-size:24px;font-weight:800;color:var(--gold);letter-spacing:-.3px}
.logo-sub{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px}

/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:var(--rs);border:none;font-family:var(--fu);font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.97);opacity:.85}
.btn-p{background:var(--gold);color:#0a0a0a;font-size:15px;font-weight:600;width:100%;padding:15px}
.btn-ghost{background:var(--cream4);color:var(--cream);border:1px solid var(--border)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(217,94,94,.3)}
.btn-icon{width:34px;height:34px;padding:0;border-radius:50%;font-size:16px;background:var(--cream4);color:var(--cream2);border:1px solid var(--border);flex-shrink:0}
.btn-back{font-size:13px;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:4px;-webkit-user-select:none;user-select:none;white-space:nowrap}

/* CARDS */
.glist{padding:14px;display:flex;flex-direction:column;gap:10px}
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;cursor:pointer;transition:border-color .2s,background .15s}
.gcard:active{background:var(--surface2);border-color:var(--gold)}
.gcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:10px}
.gcard-name{font-family:var(--ff);font-size:17px;font-weight:700}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.badge-on{background:rgba(114,196,122,.2);color:var(--green)}
.badge-off{background:var(--cream4);color:var(--muted)}
.gcard.done{background:#111111;border-color:#222222;opacity:.82}
.gcard.done .gcard-name{color:var(--cream2)}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.sv.struck{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--red);text-decoration-thickness:2px}
.gcard-info{font-size:13px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.gcard-actions{display:flex;gap:8px;margin-top:11px;border-top:1px solid var(--border);padding-top:11px}
.gcard-act{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;border:none;font-family:var(--fu);transition:opacity .15s}
.gcard-act:active{opacity:.7}
.gcard-act-share{background:var(--gold-dim);color:var(--gold)}
.gcard-act-del{background:var(--red-dim);color:var(--red)}
.empty-icon{font-size:50px;margin-bottom:14px}
.empty-t{font-family:var(--ff);font-size:20px;color:var(--cream2);margin-bottom:8px}
.empty-s{font-size:14px;line-height:1.6}

/* SESSION SCREEN */
.sess-hdr{padding:max(env(safe-area-inset-top),16px) 14px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.sess-hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sess-title{font-family:var(--ff);font-size:19px;font-weight:700;flex:1;text-align:center;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sess-meta{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pv-group{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.pv-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--cream);font-family:var(--fu);font-size:14px;width:62px;padding:5px 8px;text-align:right}
.pv-input:focus{outline:none;border-color:var(--gold)}
.games-sec{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:14px 14px 8px}

/* GAME HDR */
.ghdr{padding:max(env(safe-area-inset-top),16px) 14px 0;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.ghdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.gtitle{font-family:var(--ff);font-size:19px;font-weight:600;flex:1;text-align:center;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ghdr-settings{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);gap:8px}
.gsess-label{font-size:12px;color:var(--muted);text-align:center;padding-bottom:6px}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{background:#111111;padding:10px 7px;text-align:center;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:5;box-shadow:0 3px 8px rgba(0,0,0,.8)}
.tbl th.p-col{min-width:70px}
.tbl th.ans-col{width:46px}
.tbl th.rd-col{width:30px}
.tbl th.a-col{background:#1e1a08!important;color:var(--gold)!important}
.tbl td{padding:8px 6px;text-align:center;border-bottom:1px solid rgba(36,36,36,.9);vertical-align:middle}
.tbl td.p-col{min-width:70px}
.tbl td.a-col{background:var(--gold-glow)}
.tbl td.tap{cursor:pointer;transition:background .15s}
.tbl td.tap:active{background:var(--gold-dim)}
.tbl td.tap.a-col:active{background:rgba(201,168,76,.25)}
.round-top td{border-top:2px solid var(--border)}
.round-bot td{border-bottom:2px solid var(--border)}
.rz-row{background:rgba(60,110,220,.04)}
.sp-row{background:rgba(201,168,76,.03)}
.row-lbl{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 5px;border-radius:4px}
.row-lbl.rz{color:#6b9ae0;background:rgba(107,154,224,.1)}
.row-lbl.sp{color:var(--green);background:rgba(114,196,122,.1)}
.rnum{font-size:12px;color:var(--muted);font-weight:600;display:block}
.del-r{display:block;font-size:13px;font-weight:700;color:var(--red);cursor:pointer;line-height:1;margin-bottom:2px;opacity:.7}
.del-r:active{opacity:1}
.sv{font-size:16px;font-weight:500}
.sv.e{color:var(--border2)}
.sv.pos{color:var(--cream)}
.sv.neg{color:var(--red)}
.sv.zero{color:var(--muted);font-style:italic}
.sv.ans{font-size:15px;color:var(--gold);font-weight:600}
.totals-row td{background:var(--surface)!important;padding:12px 6px;border-top:2px solid var(--gold)!important;border-bottom:none!important}
.tv{font-size:16px;font-weight:700;font-family:var(--ff);letter-spacing:-.2px}
.tv.pos{color:var(--green)}.tv.neg{color:var(--red)}.tv.z{color:var(--muted)}
.empty-rounds{text-align:center;padding:40px 14px;color:var(--muted);font-size:13px}

/* FAB */
.fab{position:sticky;bottom:0;padding:12px 14px;padding-bottom:max(env(safe-area-inset-bottom),14px);background:linear-gradient(transparent,var(--bg) 40%);display:flex;gap:10px;flex-shrink:0}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{background:var(--surface2);border-radius:20px 20px 0 0;padding:20px;padding-bottom:max(env(safe-area-inset-bottom),24px);width:100%;max-width:480px;border-top:1px solid var(--border);animation:sup .25s ease-out}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-pip{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-family:var(--ff);font-size:19px;font-weight:700;margin-bottom:4px}
.sheet-sub{font-size:14px;color:var(--muted);margin-bottom:18px}
.lbl{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:block}
.ig{margin-bottom:14px}
.ti{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--cream);font-family:var(--fu);font-size:16px;padding:12px 14px;transition:border-color .15s}
.ti:focus{outline:none;border-color:var(--gold)}
.ni{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--cream);font-family:var(--ff);font-size:44px;font-weight:600;padding:14px;text-align:center;transition:border-color .15s}
.ni:focus{outline:none;border-color:var(--gold)}
.psetup{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.prow{display:flex;gap:8px;align-items:center}
.prow .ti{flex:1}
.add-p{font-size:13px;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:5px;padding:7px 0;-webkit-user-select:none;user-select:none}
.btn-row{display:flex;gap:10px;margin-top:14px}
.link-btn{width:100%;margin-top:8px;background:transparent;border:none;color:var(--muted);font-family:var(--fu);font-size:13px;padding:8px;cursor:pointer;-webkit-user-select:none;user-select:none}

/* SUMMARY */
.sum-hdr{padding:max(env(safe-area-inset-top),24px) 18px 20px;text-align:center;border-bottom:1px solid var(--border)}
.sum-icon{font-size:52px;margin-bottom:8px}
.sum-title{font-family:var(--ff);font-size:24px;font-weight:800;color:var(--gold);margin-bottom:4px}
.sum-sub{font-size:14px;color:var(--muted)}
.sum-sec{padding:18px 14px 0}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}
.rank-card,.pay-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px}
.rank-row{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--border);gap:12px}
.rank-row:last-child{border-bottom:none}
.rank-row.r1{background:rgba(201,168,76,.07)}
.rnk{font-family:var(--ff);font-size:20px;font-weight:800;width:26px;text-align:center;color:var(--muted)}
.rnk.g{color:var(--gold)}.rnk.s{color:#aaa}.rnk.b{color:#b87333}
.rname{flex:1;font-size:16px;font-weight:500}
.rscore{font-family:var(--ff);font-size:18px;font-weight:700}
.rscore.pos{color:var(--green)}.rscore.neg{color:var(--red)}.rscore.z{color:var(--muted)}
.pay-row{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--border);gap:9px}
.pay-row:last-child{border-bottom:none}
.pfrom{font-size:15px;font-weight:500}
.parrow{color:var(--red);font-size:16px}
.pto{font-size:15px;font-weight:500;color:var(--gold)}
.pamount{margin-left:auto;font-family:var(--ff);font-size:18px;font-weight:700;color:var(--green)}
.nopay{text-align:center;padding:22px;color:var(--muted);font-size:14px}
.sum-btns{display:flex;gap:10px;padding-bottom:max(env(safe-area-inset-bottom),24px)}
.active-dot{font-size:8px;color:var(--gold);display:block;margin-top:2px}
.game-breakdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px}
.gb-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px}
.gb-row:last-child{border-bottom:none}
.gb-name{font-size:14px;color:var(--muted);width:70px;flex-shrink:0}
.gb-scores{display:flex;flex:1;gap:8px;flex-wrap:wrap}
.gb-score{font-size:14px;font-weight:500;padding:2px 8px;border-radius:4px;background:var(--cream4)}
.gb-score.pos{color:var(--green)}.gb-score.neg{color:var(--red)}.gb-score.z{color:var(--muted)}
</style>
</head>
<body>
<div class="app">

<!-- HOME: Sessions list -->
<div class="screen on" id="s-home">
  <div class="hdr">
    <div class="hdr-row">
      <div><div class="logo">Binockel</div><div class="logo-sub">Spielstand</div></div>
      <button class="btn btn-ghost" style="white-space:nowrap;flex-shrink:0" onclick="showNewSessionSheet()">+ Neue Session</button>
    </div>
  </div>
  <div class="scroll"><div class="glist" id="sess-list"></div></div>
</div>

<!-- SESSION: Games list -->
<div class="screen" id="s-session">
  <div id="sess-hdr-el"></div>
  <div class="scroll"><div id="sess-games-list"></div></div>
  <div class="fab" id="sess-fab"></div>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
  <div id="g-hdr"></div>
  <div class="scroll tbl-wrap" id="g-body"></div>
  <div class="fab" id="g-fab"></div>
</div>

<!-- GAME SUMMARY -->
<div class="screen" id="s-sum">
  <div class="scroll" id="s-body"></div>
</div>

<!-- SESSION SUMMARY -->
<div class="screen" id="s-sess-sum">
  <div class="scroll" id="ss-body"></div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet"></div>
</div>

</div>
<script>
var S = { sessions: [], curSession: null, curGame: null };

/* ===== STORAGE ===== */
function load() {
  try {
    var d = localStorage.getItem('bnk');
    if (!d) return;
    var raw = JSON.parse(d);
    // Migration: old format had S.games at top level
    if (raw.games && !raw.sessions) {
      S.sessions = raw.games.map(function(g) {
        return {
          id: g.id, name: g.name, ts: g.ts, done: g.done, endTs: g.endTs||null,
          pv: g.pv||0.5, players: g.players||[],
          games: [{ id: uid(), name: 'Spiel 1', ts: g.ts, done: g.done, endTs: g.endTs||null,
                    rounds: g.rounds||[], activeIdx: g.activeIdx||0 }]
        };
      });
      S.curSession = null; S.curGame = null;
      save();
    } else {
      S = raw;
    }
  } catch(e) {}
}
function save() { try { localStorage.setItem('bnk', JSON.stringify(S)); } catch(e) {} }
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n) { return (n/100).toFixed(2).replace('.',',') + ' €'; }
function screen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('on'); });
  document.getElementById('s-'+id).classList.add('on');
}

/* ===== ACCESSORS ===== */
function cs() { return S.sessions.find(function(s){ return s.id===S.curSession; }); }
function cg() {
  var sess = cs(); if (!sess) return null;
  return sess.games.find(function(g){ return g.id===S.curGame; });
}

/* ===== HOME ===== */
function home() {
  S.curSession = null; S.curGame = null;
  screen('home');
  var el = document.getElementById('sess-list');
  if (!S.sessions.length) {
    el.innerHTML = '<div style="text-align:center;padding:60px 30px;color:var(--muted)"><div class="empty-icon">🃏</div><div class="empty-t">Noch keine Sessions</div><div class="empty-s">Erstelle eine Session für deinen Spieleabend. Innerhalb einer Session kannst du mehrere Spiele eintragen.</div></div>';
    return;
  }
  el.innerHTML = S.sessions.slice().reverse().map(function(sess) {
    var d = new Date(sess.ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
    var doneGames = sess.games.filter(function(g){return g.done;}).length;
    var badge = sess.done ? '<span class="badge badge-off">Beendet</span>' : '<span class="badge badge-on">Aktiv</span>';
    return '<div class="gcard'+(sess.done?' done':'')+'" onclick="openSession(\''+sess.id+'\')">' +
      '<div class="gcard-top"><div class="gcard-name">'+esc(sess.name)+'</div>'+badge+'</div>' +
      '<div class="gcard-info"><span>📅 '+d+'</span><span>♟️ '+sess.games.length+' Spiele</span><span>👥 '+sess.players.map(function(p){return esc(p.n);}).join(' · ')+'</span></div>' +
      '<div class="gcard-actions" onclick="event.stopPropagation()">' +
      '<button class="gcard-act gcard-act-share" onclick="pdfSessionById(\''+sess.id+'\')">↗ Teilen</button>' +
      '<button class="gcard-act gcard-act-del" onclick="deleteSession(\''+sess.id+'\')">✕ Löschen</button>' +
      '</div></div>';
  }).join('');
}

/* ===== NEW SESSION SHEET ===== */
function showNewSessionSheet() {
  document.getElementById('sheet').innerHTML =
    '<div class="sheet-pip"></div>' +
    '<div class="sheet-title">Neue Session</div>' +
    '<div class="sheet-sub">Name und Spieler für diesen Spieleabend</div>' +
    '<div class="ig"><label class="lbl">Session-Name</label><input class="ti" id="ns-name" type="text" placeholder="z. B. Freitag bei Klaus" maxlength="40"></div>' +
    '<div class="ig"><label class="lbl">Spieler</label>' +
    '<div class="psetup" id="ns-players">' +
    '<div class="prow"><input class="ti" type="text" value="Spieler 1" maxlength="16"><button class="btn-icon" onclick="rmP(this)">✕</button></div>' +
    '<div class="prow"><input class="ti" type="text" value="Spieler 2" maxlength="16"><button class="btn-icon" onclick="rmP(this)">✕</button></div>' +
    '<div class="prow"><input class="ti" type="text" value="Spieler 3" maxlength="16"><button class="btn-icon" onclick="rmP(this)">✕</button></div>' +
    '</div><div class="add-p" onclick="addP()">＋ Spieler hinzufügen</div></div>' +
    '<div class="ig"><label class="lbl">ct pro Punkt</label><input class="ti" id="ns-pv" type="number" step="0.01" min="0" placeholder="0.50" value="0.50"></div>' +
    '<button class="btn btn-p" onclick="createSession()" style="margin-top:6px">Session starten</button>';
  openOverlay();
  setTimeout(function(){ document.getElementById('ns-name').focus(); }, 320);
}

function addP() {
  var ps = document.getElementById('ns-players')||document.getElementById('ng-players'); if(!ps)return;
  var n = ps.children.length + 1;
  var d = document.createElement('div'); d.className='prow';
  d.innerHTML = '<input class="ti" type="text" value="Spieler '+n+'" maxlength="16"><button class="btn-icon" onclick="rmP(this)">✕</button>';
  ps.appendChild(d);
}
function rmP(btn) {
  var ps = btn.closest('.psetup'); if(!ps||ps.children.length<=2) return;
  btn.parentElement.remove();
}

function createSession() {
  var name = (document.getElementById('ns-name').value.trim())||'Session';
  var pinputs = document.querySelectorAll('#ns-players .prow input');
  var players = Array.from(pinputs).map(function(inp,i){ return {id:uid(), n:inp.value.trim()||('Spieler '+(i+1))}; });
  var pv = parseFloat(document.getElementById('ns-pv').value)||0.5;
  var sess = { id:uid(), name:name, ts:Date.now(), done:false, pv:pv, players:players, games:[] };
  S.sessions.push(sess);
  S.curSession = sess.id;
  save(); closeOverlay(); openSession(sess.id);
}

/* ===== SESSION VIEW ===== */
function openSession(id) {
  S.curSession = id; S.curGame = null;
  var sess = cs(); if (!sess) { home(); return; }
  screen('session');
  renderSessionHdr(sess);
  renderSessionGames(sess);
  renderSessionFab(sess);
}

function renderSessionHdr(sess) {
  var el = document.getElementById('sess-hdr-el');
  el.className = 'sess-hdr';
  el.innerHTML =
    '<div class="sess-hdr-top">' +
    '<div class="btn-back" onclick="home()">← Zurück</div>' +
    '<div class="sess-title">'+esc(sess.name)+'</div>' +
    '<button class="btn btn-ghost" style="font-size:12px;padding:7px 11px;white-space:nowrap;flex-shrink:0" onclick="manageSessionPlayers()">Spieler ✎</button>' +
    '</div>' +
    '<div class="sess-meta">' +
    '<div class="pv-group"><span>1 Punkt =</span>' +
    '<input class="pv-input" type="number" step="0.01" min="0" value="'+sess.pv+'" onchange="updSessPv(this.value)"'+(sess.done?' disabled':'')+'>ct</div>' +
    (sess.done
      ? '<button class="btn btn-ghost" style="font-size:12px;padding:7px 12px" onclick="showSessSum()">Gesamtauswertung ›</button>'
      : '<button class="btn btn-danger" style="font-size:12px;padding:7px 12px" onclick="confirmEndSession()">Session beenden</button>') +
    '</div>';
}

function renderSessionGames(sess) {
  var el = document.getElementById('sess-games-list');
  var allTots = {};
  sess.players.forEach(function(p){ allTots[p.id]=0; });
  sess.games.forEach(function(g){
    var gt = calcTotals(g, sess.players);
    sess.players.forEach(function(p){ allTots[p.id]+=(gt[p.id]||0); });
  });

  var header = '<div class="games-sec">Spiele ('+(sess.games.length)+')</div>';
  if (!sess.games.length) {
    el.innerHTML = header + '<div style="text-align:center;padding:30px 14px;color:var(--muted);font-size:13px">Noch keine Spiele — tippe auf „+ Neues Spiel"</div>';
    return;
  }

  var cards = sess.games.map(function(g, gi) {
    var gt = calcTotals(g, sess.players);
    var badge = g.done ? '<span class="badge badge-off">Beendet</span>' : '<span class="badge badge-on">Aktiv</span>';
    var scores = sess.players.map(function(p){
      var t=gt[p.id]||0; var cls=t>0?'pos':t<0?'neg':'z';
      return '<span class="gb-score '+cls+'">'+esc(p.n)+': '+(t>0?'+':'')+t+' Pkt</span>';
    }).join('');

    var settleSection = '';
    if (g.done) {
      var gRanked = sess.players.map(function(p){return{n:p.n,t:gt[p.id]||0};}).sort(function(a,b){return b.t-a.t;});
      var gSettle = calcSettle(gRanked, sess.pv);
      if (gSettle.length > 0) {
        settleSection = '<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:4px">' +
          gSettle.map(function(s){
            return '<div style="display:flex;align-items:center;gap:6px;font-size:12px">' +
              '<span style="color:var(--cream2)">'+esc(s.from)+'</span>' +
              '<span style="color:var(--muted)">→</span>' +
              '<span style="color:var(--gold)">'+esc(s.to)+'</span>' +
              '<span style="margin-left:auto;font-weight:600;color:var(--green)">'+fmt(s.amt)+'</span>' +
              '</div>';
          }).join('') + '</div>';
      } else {
        settleSection = '<div style="margin-top:7px;font-size:12px;color:var(--muted)">🎉 Alle gleich</div>';
      }
    }

    return '<div class="gcard'+(g.done?' done':'')+'" onclick="openGameInSession(\''+g.id+'\')">' +
      '<div class="gcard-top"><div class="gcard-name">'+esc(g.name)+'</div>'+badge+'</div>' +
      '<div class="gcard-info"><span>🎴 '+g.rounds.length+' Runden</span></div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">'+scores+'</div>' +
      settleSection +
      '</div>';
  }).join('');

  // Running total + live settlement
  var allRanked = sess.players.map(function(p){return{n:p.n,t:allTots[p.id]||0,id:p.id};}).sort(function(a,b){return b.t-a.t;});
  var liveSettle = calcSessionSettle(sess);
  var settleHtml = '';
  if (liveSettle.length > 0) {
    settleHtml = '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:5px">' +
      liveSettle.map(function(s){
        return '<div style="display:flex;align-items:center;gap:7px;font-size:13px">' +
          '<span style="color:var(--cream2)">'+esc(s.from)+'</span>' +
          '<span style="color:var(--muted)">→</span>' +
          '<span style="color:var(--gold)">'+esc(s.to)+'</span>' +
          '<span style="margin-left:auto;font-weight:600;color:var(--green)">'+fmt(s.amt)+'</span>' +
          '</div>';
      }).join('') +
      '</div>';
  } else if (sess.games.length > 0) {
    settleHtml = '<div style="margin-top:8px;font-size:12px;color:var(--muted)">🎉 Alle gleich – keine Zahlungen</div>';
  }
  var totRow = '<div style="background:var(--surface);border:1px solid var(--gold);border-radius:var(--r);margin:4px 14px 14px;padding:12px 14px">' +
    '<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px">Aktueller Gesamtstand</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:8px">' +
    sess.players.map(function(p){
      var t=allTots[p.id]||0; var cls=t>0?'pos':t<0?'neg':'z';
      return '<span class="gb-score '+cls+'" style="font-size:14px;font-weight:600">'+esc(p.n)+': '+(t>0?'+':'')+t+' Pkt</span>';
    }).join('') +
    '</div>' + settleHtml + '</div>';

  el.innerHTML = header + '<div class="glist" style="padding-bottom:0">'+cards+'</div>' + totRow;
}

function renderSessionFab(sess) {
  var el = document.getElementById('sess-fab');
  if (sess.done) {
    el.innerHTML = '<button class="btn btn-ghost" style="flex:1" onclick="home()">← Startseite</button>' +
      '<button class="btn btn-p" style="flex:2" onclick="showSessSum()">Gesamtauswertung</button>';
  } else {
    el.innerHTML = '<button class="btn btn-p" onclick="showNewGameSheet()">+ Neues Spiel</button>';
  }
}

function updSessPv(v) { var s=cs(); if(!s)return; s.pv=parseFloat(v)||0; save(); }

/* ===== NEW GAME WITHIN SESSION ===== */
function showNewGameSheet() {
  var sess = cs(); if (!sess) return;
  var n = sess.games.length + 1;
  document.getElementById('sheet').innerHTML =
    '<div class="sheet-pip"></div>' +
    '<div class="sheet-title">Neues Spiel</div>' +
    '<div class="sheet-sub">'+esc(sess.name)+'</div>' +
    '<div class="ig"><label class="lbl">Spielname</label><input class="ti" id="ng-name" type="text" value="Spiel '+n+'" maxlength="40"></div>' +
    '<button class="btn btn-p" onclick="createGame()" style="margin-top:6px">Starten</button>';
  openOverlay();
  setTimeout(function(){ var i=document.getElementById('ng-name'); if(i){i.focus();i.select();} },320);
}

function createGame() {
  var sess = cs(); if (!sess) return;
  var name = (document.getElementById('ng-name').value.trim())||('Spiel '+(sess.games.length+1));
  var g = { id:uid(), name:name, ts:Date.now(), done:false, rounds:[], activeIdx:0 };
  sess.games.push(g);
  S.curGame = g.id;
  save(); closeOverlay(); renderGame();
}

/* ===== GAME ===== */
function openGameInSession(gid) {
  S.curGame = gid;
  var g = cg(); if (!g) { openSession(S.curSession); return; }
  if (g.done) { renderGame(); showSum(); return; }
  renderGame();
}

function renderGame() {
  var sess = cs(); var g = cg();
  if (!sess||!g) { openSession(S.curSession); return; }
  screen('game');
  renderGhdr(sess, g);
  renderGbody(sess, g);
  renderGfab(g);
}

function renderGhdr(sess, g) {
  var el = document.getElementById('g-hdr');
  el.className = 'ghdr';
  el.innerHTML =
    '<div style="text-align:center;font-size:11px;color:var(--muted);padding-top:2px;padding-bottom:4px">'+esc(sess.name)+'</div>' +
    '<div class="ghdr-top">' +
    '<div class="btn-back" onclick="openSession(\''+sess.id+'\')">← Session</div>' +
    '<div class="gtitle">'+esc(g.name)+'</div>' +
    '<button class="btn btn-ghost" style="font-size:12px;padding:7px 11px;white-space:nowrap;flex-shrink:0" onclick="manageSheet()">Spieler ✎</button>' +
    '</div>' +
    '<div class="ghdr-settings">' +
    '<div class="pv-group"><span>1 Pkt = '+sess.pv.toString().replace('.',',')+'ct</span></div>' +
    (g.done
      ? '<button class="btn btn-ghost" style="font-size:12px;padding:7px 12px" onclick="showSum()">Auswertung ›</button>'
      : '<button class="btn btn-danger" style="font-size:12px;padding:7px 12px" onclick="confirmEnd()">Beenden</button>') +
    '</div>';
}

function renderGbody(sess, g) {
  var ap = g.done ? -1 : (g.activeIdx!==undefined ? g.activeIdx : g.rounds.length % sess.players.length);
  var lastRi = g.rounds.length - 1;

  var thead = '<thead><tr><th class="rd-col">#</th><th class="ans-col">Ans.</th>';
  sess.players.forEach(function(p,i){
    var act = !g.done && i===ap;
    var clickable = !g.done && !act;
    thead += '<th class="p-col'+(act?' a-col':'')+'"'+(clickable?' onclick="setActivePlayer('+i+')" style="cursor:pointer"':'')+'>'+esc(p.n)+(act?'<span class="active-dot">● dran</span>':'')+'</th>';
  });
  thead += '</tr></thead>';

  var tbody = '<tbody>';
  if (!g.rounds.length) {
    tbody += '<tr><td colspan="'+(2+sess.players.length)+'" class="empty-rounds">Noch keine Runden — tippe auf „+ Runde"</td></tr>';
  }

  g.rounds.forEach(function(r,ri){
    var rap = ri % sess.players.length;
    var isLast = ri === lastRi && !g.done;
    var ansVal = r.ans!==undefined ? '<span class="sv ans">'+r.ans+'</span>' : '<span class="sv e">–</span>';
    var ansTap = !g.done ? 'tap" onclick="scoreInput('+ri+',\'ans\',null,null)' : '"';

    // # cell: show delete button only on last round
    var numCell = isLast
      ? '<td class="rd-col" rowspan="2"><span class="del-r" onclick="deleteLastRound()" title="Letzte Runde löschen">−</span><span class="rnum">'+(ri+1)+'</span></td>'
      : '<td class="rd-col" rowspan="2"><span class="rnum">'+(ri+1)+'</span></td>';

    // Row 1: Reizen
    tbody += '<tr class="rz-row round-top">'+numCell+
      '<td class="ans-col '+ansTap+'">'+ansVal+'</td>';
    sess.players.forEach(function(p,pi){
      var v = r.rz[p.id];
      var spIsZero = r.sp[p.id]===0;
      var cls = spIsZero?'struck':v===undefined?'e':v<0?'neg':'pos';
      var disp = v===undefined?'–':v;
      var act = pi===rap?' a-col':'';
      var tap = !g.done?' tap" onclick="scoreInput('+ri+',\'rz\',\''+p.id+'\',\''+esc(p.n)+'\')"':'"';
      tbody += '<td class="p-col'+act+' '+tap+'"><span class="sv '+cls+'">'+disp+'</span></td>';
    });
    tbody += '</tr>';

    // Row 2: Spielen
    tbody += '<tr class="sp-row round-bot"><td class="ans-col"><span class="row-lbl sp">Sp</span></td>';
    sess.players.forEach(function(p,pi){
      var v = r.sp[p.id];
      var cls = v===undefined?'e':v===0?'zero':v<0?'neg':'pos';
      var disp = v===undefined?'–':v;
      var act = pi===rap?' a-col':'';
      var tap = !g.done?' tap" onclick="scoreInput('+ri+',\'sp\',\''+p.id+'\',\''+esc(p.n)+'\')"':'"';
      tbody += '<td class="p-col'+act+' '+tap+'"><span class="sv '+cls+'">'+disp+'</span></td>';
    });
    tbody += '</tr>';
  });

  // Totals row
  var tots = calcTotals(g, sess.players);
  var maxT = Math.max.apply(null, sess.players.map(function(p){ return tots[p.id]||0; }));
  tbody += '<tr class="totals-row"><td colspan="2" style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Gesamt</td>';
  sess.players.forEach(function(p){
    var t = tots[p.id]||0;
    var cls = t>0?'pos':t<0?'neg':'z';
    var crown = (t===maxT&&g.rounds.length>0&&t!==0)?'<br><span style="font-size:14px">👑</span>':'';
    tbody += '<td><span class="tv '+cls+'">'+t+'</span>'+crown+'</td>';
  });
  tbody += '</tr></tbody>';

  document.getElementById('g-body').innerHTML = '<table class="tbl">'+thead+tbody+'</table>';
}

function renderGfab(g) {
  var el = document.getElementById('g-fab');
  if (g.done) {
    el.innerHTML = '<button class="btn btn-ghost" style="flex:1" onclick="openSession(\''+S.curSession+'\')">← Session</button>' +
      '<button class="btn btn-p" style="flex:2" onclick="showSum()">Auswertung</button>';
  } else {
    el.innerHTML = '<button class="btn btn-p" onclick="addRound()">+ Runde</button>';
  }
}

function setActivePlayer(i) { var g=cg(); if(!g||g.done)return; g.activeIdx=i; save(); renderGame(); }

function addRound() {
  var sess=cs(); var g=cg(); if(!sess||!g||g.done)return;
  g.rounds.push({rz:{},sp:{},ans:undefined});
  var cur = g.activeIdx!==undefined ? g.activeIdx : (g.rounds.length-1) % sess.players.length;
  g.activeIdx = (cur+1) % sess.players.length;
  save(); renderGame();
  setTimeout(function(){ var b=document.getElementById('g-body'); b.scrollTop=b.scrollHeight; },60);
}

function deleteLastRound() {
  var g=cg(); if(!g||g.done||!g.rounds.length)return;
  g.rounds.pop();
  var sess=cs();
  // Step active player back
  g.activeIdx = ((g.activeIdx||0) - 1 + (sess?sess.players.length:3)) % (sess?sess.players.length:3);
  save(); renderGame();
}

/* ===== SCORE INPUT ===== */
function scoreInput(ri, type, pid, pname) {
  var g=cg(); if(!g)return;
  var r=g.rounds[ri];
  var cur, label, sublabel;
  if(type==='ans'){cur=r.ans;label='Ansage';sublabel='Runde '+(ri+1)+' · Reizwert';}
  else if(type==='rz'){cur=r.rz[pid];label=esc(pname);sublabel='Runde '+(ri+1)+' · Reizen';}
  else{cur=r.sp[pid];label=esc(pname);sublabel='Runde '+(ri+1)+' · Spielen';}
  var delBtn = cur!==undefined ? '<button class="link-btn" onclick="clearScore('+ri+',\''+type+'\',\''+pid+'\')">Eintrag löschen</button>' : '';
  document.getElementById('sheet').innerHTML =
    '<div class="sheet-pip"></div>' +
    '<div class="sheet-title">'+label+'</div>' +
    '<div class="sheet-sub">'+sublabel+'</div>' +
    '<div style="display:flex;gap:10px;align-items:center">' +
    '<button id="si-sign" onclick="toggleSign()" style="flex-shrink:0;width:52px;height:72px;border-radius:10px;border:1px solid var(--border);background:var(--cream4);color:var(--cream);font-size:26px;font-weight:300;cursor:pointer;font-family:var(--ff)">'+((cur!==undefined&&cur<0)?'−':'+')+'</button>' +
    '<input class="ni" id="si" type="number" inputmode="numeric" placeholder="0" value="'+(cur!==undefined?Math.abs(cur):'')+'" style="flex:1" onkeydown="if(event.key===\'Enter\')saveScore('+ri+',\''+type+'\',\''+pid+'\')">' +
    '</div>' +
    '<div class="btn-row">' +
    '<button class="btn btn-ghost" style="flex:1" onclick="closeOverlay()">Abbrechen</button>' +
    '<button class="btn btn-p" style="flex:2" onclick="saveScore('+ri+',\''+type+'\',\''+pid+'\')">Speichern</button>' +
    '</div>'+delBtn;
  openOverlay();
  setTimeout(function(){ var i=document.getElementById('si'); if(i){i.focus();i.select();} },320);
}

function toggleSign() {
  var btn=document.getElementById('si-sign');
  var isNeg=btn.textContent==='−';
  btn.textContent=isNeg?'+':'−';
  btn.style.color=isNeg?'var(--cream)':'var(--red)';
  btn.style.borderColor=isNeg?'var(--border)':'rgba(217,94,94,.4)';
}
function parseScore(v) {
  if(v===''||v===null||v===undefined)return undefined;
  var n=parseInt(v,10); return isNaN(n)?undefined:n;
}
function saveScore(ri,type,pid) {
  var g=cg(); if(!g)return;
  var v=document.getElementById('si').value;
  var signBtn=document.getElementById('si-sign');
  var neg=signBtn&&signBtn.textContent==='−';
  var r=g.rounds[ri];
  var n=parseScore(v);
  if(n!==undefined&&neg)n=-Math.abs(n);
  if(n!==undefined&&!neg)n=Math.abs(n);
  if(type==='ans'){r.ans=n;}
  else{if(n===undefined)delete r[type][pid];else r[type][pid]=n;}
  save(); closeOverlay(); renderGame();
}
function clearScore(ri,type,pid) {
  var g=cg(); if(!g)return;
  var r=g.rounds[ri];
  if(type==='ans')r.ans=undefined;else delete r[type][pid];
  save(); closeOverlay(); renderGame();
}

/* ===== PLAYER MANAGEMENT ===== */
function manageSheet() {
  var sess=cs(); if(!sess)return;
  document.getElementById('sheet').innerHTML =
    '<div class="sheet-pip"></div>' +
    '<div class="sheet-title">Spieler</div>' +
    '<div class="sheet-sub">Gilt für alle Spiele dieser Session</div>' +
    '<div class="psetup" id="mp">'+
    sess.players.map(function(p){
      return '<div class="prow" data-id="'+p.id+'"><input class="ti" type="text" value="'+esc(p.n)+'" maxlength="16" oninput="renameP(\''+p.id+'\',this.value)"><button class="btn-icon" onclick="removeP(\''+p.id+'\')">✕</button></div>';
    }).join('')+
    '</div><div class="add-p" onclick="addNewP()">＋ Spieler hinzufügen</div>' +
    '<button class="btn btn-p" style="margin-top:14px" onclick="closeOverlay()">Fertig</button>';
  openOverlay();
}
function manageSessionPlayers() { manageSheet(); }

function renameP(pid,val) {
  var sess=cs(); if(!sess)return;
  var p=sess.players.find(function(p){return p.id===pid;}); if(p){p.n=val||p.n;save();}
}
function removeP(pid) {
  var sess=cs(); if(!sess||sess.players.length<=2)return;
  sess.players=sess.players.filter(function(p){return p.id!==pid;});
  sess.games.forEach(function(g){ g.rounds.forEach(function(r){delete r.rz[pid];delete r.sp[pid];}); });
  save(); manageSheet();
  if(document.getElementById('s-game').classList.contains('on'))renderGame();
  else openSession(sess.id);
}
function addNewP() {
  var sess=cs(); if(!sess)return;
  sess.players.push({id:uid(),n:'Spieler '+(sess.players.length+1)});
  save(); manageSheet();
  if(document.getElementById('s-game').classList.contains('on'))renderGame();
}

/* ===== FINISH GAME ===== */
function confirmEnd() {
  document.getElementById('sheet').innerHTML =
    '<div class="sheet-pip"></div>' +
    '<div class="sheet-title">Spiel beenden?</div>' +
    '<div class="sheet-sub">Danach können keine Punkte mehr eingetragen werden.</div>' +
    '<div class="btn-row">' +
    '<button class="btn btn-ghost" style="flex:1" onclick="closeOverlay()">Weiter spielen</button>' +
    '<button class="btn btn-danger" style="flex:1" onclick="endGame()">Beenden</button>' +
    '</div>';
  openOverlay();
}
function endGame() {
  var g=cg(); if(!g)return;
  g.done=true; g.endTs=Date.now(); save(); closeOverlay(); renderGame();
  setTimeout(function(){showSum();},200);
}

/* ===== FINISH SESSION ===== */
function confirmEndSession() {
  var sess=cs(); if(!sess)return;
  var active=sess.games.filter(function(g){return !g.done;}).length;
  var warn=active>0?'<div style="color:var(--red);font-size:13px;margin-bottom:10px">⚠ '+active+' Spiel(e) noch nicht beendet.</div>':'';
  document.getElementById('sheet').innerHTML =
    '<div class="sheet-pip"></div>' +
    '<div class="sheet-title">Session beenden?</div>' +
    '<div class="sheet-sub">Die Session wird abgeschlossen und die Gesamtabrechnung erstellt.</div>' +
    warn +
    '<div class="btn-row">' +
    '<button class="btn btn-ghost" style="flex:1" onclick="closeOverlay()">Weiter spielen</button>' +
    '<button class="btn btn-danger" style="flex:1" onclick="endSession()">Beenden</button>' +
    '</div>';
  openOverlay();
}
function endSession() {
  var sess=cs(); if(!sess)return;
  sess.done=true; sess.endTs=Date.now(); save(); closeOverlay();
  openSession(sess.id);
  setTimeout(function(){showSessSum();},200);
}

/* ===== GAME SUMMARY ===== */
function showSum() {
  var sess=cs(); var g=cg(); if(!sess||!g)return;
  screen('sum');
  var tots=calcTotals(g,sess.players);
  var ranked=sess.players.map(function(p){return {id:p.id,n:p.n,t:tots[p.id]||0};}).sort(function(a,b){return b.t-a.t;});
  var medals=['🥇','🥈','🥉']; var rankCls=['g','s','b'];
  var rankHtml=ranked.map(function(p,i){
    var cls=p.t>0?'pos':p.t<0?'neg':'z';
    return '<div class="rank-row'+(i===0?' r1':'')+'"><div class="rnk '+(rankCls[i]||'')+'">'+
      (medals[i]||((i+1)+'.'))+
      '</div><div class="rname">'+esc(p.n)+'</div><div class="rscore '+cls+'">'+
      (p.t>0?'+':'')+p.t+' Pkt</div></div>';
  }).join('');
  var settle=calcSettle(ranked,sess.pv);
  var payHtml=settle.length===0
    ? '<div class="nopay">Alle gleich – keine Zahlungen 🎉</div>'
    : settle.map(function(s){
        return '<div class="pay-row"><div class="pfrom">'+esc(s.from)+'</div><div class="parrow">→</div><div class="pto">'+esc(s.to)+'</div><div class="pamount">'+fmt(s.amt)+'</div></div>';
      }).join('');
  document.getElementById('s-body').innerHTML =
    '<div class="sum-hdr"><div class="sum-icon">🏆</div>' +
    '<div class="sum-title">Spielende</div>' +
    '<div class="sum-sub">'+esc(g.name)+' · '+g.rounds.length+' Runden</div></div>' +
    '<div class="sum-sec">' +
    '<div class="sec-title">Rangliste</div><div class="rank-card">'+rankHtml+'</div>' +
    '<div class="sec-title">Abrechnung ('+sess.pv.toString().replace('.',',')+' ct/Pkt)</div>' +
    '<div class="pay-card">'+payHtml+'</div>' +
    '<div class="sum-btns">' +
    '<button class="btn btn-ghost" style="flex:1" onclick="renderGame()">Zur Tabelle</button>' +

function showSessSum() {
  var sess=cs(); if(!sess)return;
  screen('sess-sum');
  var allTots={};
  sess.players.forEach(function(p){allTots[p.id]=0;});
  var breakdownRows='';
  sess.games.forEach(function(g){
    if(!g.done)return;
    var gt=calcTotals(g,sess.players);
    var scores=sess.players.map(function(p){
      var t=gt[p.id]||0; var cls=t>0?'pos':t<0?'neg':'z';
      allTots[p.id]+=t;
      return '<span class="gb-score '+cls+'">'+esc(p.n)+': '+(t>0?'+':'')+t+' Pkt</span>';
    }).join('');
    breakdownRows+='<div class="gb-row"><div class="gb-name">'+esc(g.name)+'</div><div class="gb-scores">'+scores+'</div></div>';
  });

  var ranked=sess.players.map(function(p){return {id:p.id,n:p.n,t:allTots[p.id]||0};}).sort(function(a,b){return b.t-a.t;});
  var medals=['🥇','🥈','🥉']; var rankCls=['g','s','b'];
  var rankHtml=ranked.map(function(p,i){
    var cls=p.t>0?'pos':p.t<0?'neg':'z';
    return '<div class="rank-row'+(i===0?' r1':'')+'"><div class="rnk '+(rankCls[i]||'')+'">'+
      (medals[i]||((i+1)+'.'))+
      '</div><div class="rname">'+esc(p.n)+'</div><div class="rscore '+cls+'">'+
      (p.t>0?'+':'')+p.t+' Pkt</div></div>';
  }).join('');
  var settle=calcSessionSettle(sess);
  var payHtml=settle.length===0
    ? '<div class="nopay">Alle gleich – keine Zahlungen 🎉</div>'
    : settle.map(function(s){
        return '<div class="pay-row"><div class="pfrom">'+esc(s.from)+'</div><div class="parrow">→</div><div class="pto">'+esc(s.to)+'</div><div class="pamount">'+fmt(s.amt)+'</div></div>';
      }).join('');

  document.getElementById('ss-body').innerHTML =
    '<div class="sum-hdr"><div class="sum-icon">🏆</div>' +
    '<div class="sum-title">Session-Ergebnis</div>' +
    '<div class="sum-sub">'+esc(sess.name)+' · '+doneCount+' Spiele</div></div>' +
    '<div class="sum-sec">' +
    '<div class="sec-title">Gesamtrangliste</div><div class="rank-card">'+rankHtml+'</div>' +
    '<div class="sec-title">Finale Abrechnung ('+sess.pv.toString().replace('.',',')+' ct/Pkt)</div>' +
    '<div class="pay-card">'+payHtml+'</div>' +
    (breakdownRows?'<div class="sec-title">Einzelne Spiele</div><div class="game-breakdown">'+breakdownRows+'</div>':'') +
    '<div class="sum-btns">' +
    '<button class="btn btn-ghost" style="flex:1" onclick="openSession(\''+sess.id+'\')">← Zurück</button>' +
    '<button class="btn btn-p" style="flex:1" onclick="pdfSession()">↗ Teilen</button>' +
    '<button class="btn btn-ghost" style="flex:1" onclick="home()">Startseite</button>' +
    '</div></div>';

/* ===== CALC ===== */
function calcTotals(g, players) {
  var t={};
  (players||[]).forEach(function(p){t[p.id]=0;});
  g.rounds.forEach(function(r){
    (players||[]).forEach(function(p){
      // Feature 1: if sp===0, the whole round counts as 0 for this player
      if(r.sp[p.id]===0){ /* contributes 0, skip */ return; }
      if(r.rz[p.id]!==undefined) t[p.id]+=r.rz[p.id];
      if(r.sp[p.id]!==undefined) t[p.id]+=r.sp[p.id];
    });
  });
  return t;
}

function calcSettle(ranked, pv) {
  // Per-game: everyone pays the winner the difference in points × pv
  var winner = ranked[0];
  var res = [];
  for (var i = 1; i < ranked.length; i++) {
    var diff = winner.t - ranked[i].t;
    if (diff > 0 && pv > 0) {
      res.push({ from: ranked[i].n, to: winner.n, amt: Math.round(diff * pv * 10) / 10 });
    }
  }
  return res;
}

function calcSessionSettle(sess) {
  // Session settlement based on per-game debts:
  // 1. For each finished game: compute who owes whom (winner-takes-all per game)
  // 2. Accumulate all debts in a pairwise net matrix
  // 3. For each player pair: subtract reverse debts -> one clean net payment direction
  if (!sess || sess.pv <= 0) return [];

  // net[debtor_id][creditor_id] = total amount debtor owes creditor across all games (in ct)
  var net = {};
  sess.players.forEach(function(p) {
    net[p.id] = {};
    sess.players.forEach(function(q) { net[p.id][q.id] = 0; });
  });

  sess.games.forEach(function(g) {
    if (!g.done) return;
    var gt = calcTotals(g, sess.players);
    var gRanked = sess.players.map(function(p) {
      return { id: p.id, t: gt[p.id] || 0 };
    }).sort(function(a, b) { return b.t - a.t; });

    var winner = gRanked[0];
    for (var i = 1; i < gRanked.length; i++) {
      var diff = winner.t - gRanked[i].t;
      if (diff > 0) {
        var amt = Math.round(diff * sess.pv * 10) / 10;
        net[gRanked[i].id][winner.id] =
          Math.round((net[gRanked[i].id][winner.id] + amt) * 10) / 10;
      }
    }
  });

  // For each unique player pair: net out mutual debts -> one payment in the net direction
  var result = [];
  for (var i = 0; i < sess.players.length; i++) {
    for (var j = i + 1; j < sess.players.length; j++) {
      var pi = sess.players[i];
      var pj = sess.players[j];
      var netVal = Math.round((net[pi.id][pj.id] - net[pj.id][pi.id]) * 10) / 10;
      if (netVal > 0.05) {
        result.push({ from: pi.n, to: pj.n, amt: netVal });
      } else if (netVal < -0.05) {
        result.push({ from: pj.n, to: pi.n, amt: Math.round(-netVal * 10) / 10 });
      }
    }
  }
  return result;
}
